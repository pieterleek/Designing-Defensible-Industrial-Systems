# --- Algemeen ---
max_packet_size 1048576

# --- Listener: MQTT over TLS (port 8883) ---
listener 8883
protocol mqtt
allow_anonymous false

cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key

require_certificate true
use_identity_as_username true
tls_version tlsv1.2

# --- Logging ---
log_dest stdout
log_type all
connection_messages true
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# --- Persistence ---
persistence true
persistence_location /mosquitto/data/

# ============================================================
# MQTT Bridge naar AWS IoT Core
# ============================================================
connection aws-iot-bridge
address a35gm0vx97vxtv-ats.iot.eu-central-1.amazonaws.com:8883

bridge_cafile /mosquitto/bridge/amazon-root-ca.pem
bridge_certfile /mosquitto/bridge/iot-bridge.crt
bridge_keyfile /mosquitto/bridge/iot-bridge.key

bridge_tls_version tlsv1.2
remote_clientid QmanNexus-Bridge
bridge_protocol_version mqttv311

topic QmanNexus/+/+/+/+/+/DATA out 1

try_private false
cleansession true
notifications false
bridge_attempt_unsubscribe false
keepalive_interval 60
restart_timeout 5 30
