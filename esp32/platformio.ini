; ============================================================
;  PlatformIO Configuration - ESP32 MQTT Client
; ============================================================

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.4  ; Geüpgraded naar v7 voor makkelijker geheugenbeheer (optioneel)

; Vergroot de MQTT buffer, essentieel voor JSON payloads!
build_flags =
    -D MQTT_MAX_PACKET_SIZE=1024
    -D CORE_DEBUG_LEVEL=5
    
; LittleFS voor certificaat opslag
board_build.filesystem = littlefs

; Upload snelheid
upload_speed = 460800

