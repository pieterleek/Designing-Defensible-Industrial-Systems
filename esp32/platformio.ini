; ============================================================
;  PlatformIO Configuration - ESP32 MQTT Client
; ============================================================

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.5

; LittleFS voor certificaat opslag
board_build.filesystem = littlefs

; Upload snelheid
upload_speed = 460800
